<svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <linearGradient id="spade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c4d4ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Fuse rope (entirely above the bomb, does not cross body) -->
  <path d="M80 42 C84 34 90 28 94 20" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Glowing fuse tip -->
  <circle cx="94" cy="18" r="5" fill="#fbbf24" opacity="0.95"/>
  <circle cx="94" cy="18" r="10" fill="#fbbf24" opacity="0.2"/>

  <!-- Bomb body (starts below the fuse endpoint) -->
  <circle cx="80" cy="100" r="54" fill="url(#bg)"/>

  <!-- Fuse connector nub on top of bomb -->
  <rect x="74" y="46" width="12" height="14" rx="4" fill="url(#bg)"/>

  <!-- Shine highlight -->
  <ellipse cx="64" cy="80" rx="16" ry="10" fill="white" opacity="0.14"/>

  <!-- Spade symbol inside -->
  <path d="
    M80 64
    C80 64 56 78 56 92
    C56 100 62 104 70 101
    C67 109 62 114 62 114
    H98
    C98 114 93 109 90 101
    C98 104 104 100 104 92
    C104 78 80 64 80 64 Z
  " fill="url(#spade)"/>
</svg>
