body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1d3a, #020617);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;

.box {
  text-align: center;
  padding: 40px;

  color: #00e0ff;
  margin-bottom: 10px;
}

p {
  color: #aaa;
}

a {
  display: inline-block;
  margin-top: 20px;
  color: #00e0ff;
  text-decoration: none;
  border: 1px solid #00e0ff;
  padding: 10px 20px;
  border-radius: 8px;
}

a:hover {
  background: #00e0ff;
  color: black;
}
